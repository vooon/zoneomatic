        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPError'
            application/xml:
              schema:
                $ref: '#/components/schemas/HTTPError'
          description: Bad Request _(validation or deserialization error)_
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPError'
            application/xml:
              schema:
                $ref: '#/components/schemas/HTTPError'
          description: Internal Server Error _(panics)_
        default:
          description: ""
      security:
        - basicAuth: []
      summary: cleanup acme via lego httpreq
  /health:
    get:
      description: "#### Controller: \n\n`github.com/vooon/zoneomatic/internal/server.RegisterEndpoints.func1`\n\n#### Middlewares:\n\n- `github.com/go-fuego/fuego.defaultLogger.middleware`\n\n---\n\nHealth check endpoint"
      operationId: GET_/health
      parameters:
        - in: header
          name: Accept
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/string'
            application/xml:
              schema:
                $ref: '#/components/schemas/string'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPError'
            application/xml:
              schema:
                $ref: '#/components/schemas/HTTPError'
          description: Bad Request _(validation or deserialization error)_
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPError'
            application/xml:
              schema:
                $ref: '#/components/schemas/HTTPError'
          description: Internal Server Error _(panics)_
        default:
          description: ""
      summary: health
  /myip:
    get:
      description: "#### Controller: \n\n`github.com/vooon/zoneomatic/internal/server.RegisterEndpoints.func2`\n\n#### Middlewares:\n\n- `github.com/go-fuego/fuego.defaultLogger.middleware`\n\n---\n\nReturn client's connection IP address"
      operationId: GET_/myip
      parameters:
        - in: header
          name: Accept
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/string'
            application/xml:
              schema:
                $ref: '#/components/schemas/string'
          description: OK
        "400":
          content:
            application/json:
              schema:
